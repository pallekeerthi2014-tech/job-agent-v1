services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./apps/backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      API_HOST: ${API_HOST}
      API_PORT: ${BACKEND_PORT}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED}
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE}
      DAILY_JOB_HOUR: ${DAILY_JOB_HOUR}
      DAILY_JOB_MINUTE: ${DAILY_JOB_MINUTE}
      DEFAULT_QUEUE_LIMIT: ${DEFAULT_QUEUE_LIMIT}
      FRESH_JOB_MAX_AGE_HOURS: ${FRESH_JOB_MAX_AGE_HOURS}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      RESET_TOKEN_EXPIRE_MINUTES: ${RESET_TOKEN_EXPIRE_MINUTES}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      EMPLOYEE_DEFAULT_PASSWORD: ${EMPLOYEE_DEFAULT_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
      SEED_SAMPLE_CANDIDATES: ${SEED_SAMPLE_CANDIDATES}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./apps/backend:/app
      - ./seed-data:/app/seed-data:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
    env_file:
      - .env
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./apps/frontend:/frontend
      - /frontend/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
